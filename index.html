<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WEBOS 2026</title>
<link rel="stylesheet" href="style.css">
</head>

<body class="light">

<div class="boot-screen" id="bootScreen">
  <h1>WEBOS 2026</h1>
</div>

<div class="desktop" id="desktop">

  <!-- Settings Panel -->
  <div class="settings-panel">
    <button onclick="toggleTheme()">Toggle Theme</button>
    <input type="file" id="wallpaperInput" accept="image/*">
  </div>

  <!-- Taskbar -->
  <div class="taskbar">
    <div class="taskbar-icon" onclick="openWindow()">🪟</div>
  </div>

  <!-- App Window -->
  <div class="window" id="appWindow">
    <div class="window-header">
      My App
      <span onclick="closeWindow()">✖</span>
    </div>
    <div class="window-content">
      Welcome to WEBOS 2026 🚀
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
